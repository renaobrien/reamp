<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- data:/blob: allowances are for Webamp's skin engine: .wsz images
         and cursors are unpacked in-memory and applied as data URIs. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' data: blob:; media-src 'self' data: blob:" />
    <title>Reamp</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: grid;
        place-items: center;
        background: #1a1a2e;
        color: #00e5b0;
        font: 14px/1.5 monospace;
        user-select: none;
      }
      main { text-align: center; }
      #marquee { min-height: 1.5em; max-width: 480px; overflow: hidden; white-space: nowrap; }
      button, select {
        background: #16213e;
        color: #00e5b0;
        border: 1px solid #00e5b0;
        font: inherit;
        padding: 4px 14px;
        margin: 2px;
        cursor: pointer;
      }
      #status { color: #557; min-height: 1.5em; }
      #vis { background: #000; border: 1px solid #16213e; image-rendering: pixelated; }
    </style>
  </head>
  <body>
    <div id="webamp-container" style="position: absolute; inset: 0 0 40% 0"></div>
    <main>
      <p id="marquee">Reamp: transport strip (Webamp lands next)</p>
      <p id="time">0:00 / 0:00</p>
      <p>
        <button id="prev">⏮</button>
        <button id="playpause">▶</button>
        <button id="next">⏭</button>
        <select id="source">
          <option value="spotify">Spotify</option>
          <option value="apple-music">Apple Music</option>
        </select>
      </p>
      <p id="status">waiting for player state…</p>
      <canvas id="vis" width="450" height="120"></canvas>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
