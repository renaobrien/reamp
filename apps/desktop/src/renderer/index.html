<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- data:/blob: allowances are for Webamp's skin engine: .wsz images
         and cursors are unpacked in-memory and applied as data URIs. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' data: blob:; media-src 'self' data: blob:" />
    <title>Reamp</title>
    <style>
      :root {
        --bg: #0b0b12;
        --panel: #16161f;
        --bevel-light: #3a3a4e;
        --bevel-dark: #050508;
        --accent: #00e5b0;
        --dim: #5a5a72;
        /* one knob scales the whole UI: readable on a laptop, legible from
           a couch when the window is a TV */
        font-size: clamp(11px, 0.55vw + 7px, 26px);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background:
          radial-gradient(ellipse at 50% -20%, #1c1c2e 0%, var(--bg) 60%),
          var(--bg);
        color: var(--accent);
        font-family: "Menlo", "Consolas", monospace;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 1rem;
        user-select: none;
        overflow: hidden;
      }
      #titlebar {
        height: 2.2rem;
        line-height: 2.2rem;
        flex: none;
        text-align: center;
        color: var(--dim);
        font-size: 0.9rem;
        -webkit-app-region: drag;
      }
      #stage {
        flex: 1;
        position: relative;
        min-height: 0;
      }
      /* stage backdrops sit behind Webamp's windows */
      #milkdrop-bg, #scene-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: none;
        background: #04040a;
      }
      body.mode-milkdrop #milkdrop-bg { display: block; }
      body.mode-scene #scene-bg { display: block; }
      #webamp-container { position: absolute; inset: 0; }
      #stage:fullscreen { background: #000; }
      #deck {
        flex: none;
        margin: 0 0.7rem 0.7rem;
        padding: 0.7rem;
        background: var(--panel);
        border: 2px solid;
        border-color: var(--bevel-light) var(--bevel-dark) var(--bevel-dark) var(--bevel-light);
        display: grid;
        grid-template-columns: minmax(0, 3fr) minmax(0, 2fr);
        grid-template-rows: auto auto;
        gap: 0.5rem 1rem;
        align-items: center;
      }
      #vis {
        grid-row: 1 / span 2;
        width: 100%;
        aspect-ratio: 299 / 49; /* logical vis grid, scaled crisply */
        height: auto;
        image-rendering: pixelated;
        background: #000;
        border: 2px solid;
        border-color: var(--bevel-dark) var(--bevel-light) var(--bevel-light) var(--bevel-dark);
        cursor: pointer;
      }
      #readout {
        display: flex;
        gap: 1rem;
        align-items: baseline;
        min-width: 0;
      }
      #marquee {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        color: var(--accent);
      }
      #time { color: var(--accent); flex: none; font-variant-numeric: tabular-nums; }
      #controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
      .btn-group { display: flex; gap: 0.3rem; }
      button, select {
        -webkit-app-region: no-drag;
        background: var(--panel);
        color: var(--accent);
        border: 2px solid;
        border-color: var(--bevel-light) var(--bevel-dark) var(--bevel-dark) var(--bevel-light);
        font: inherit;
        letter-spacing: inherit;
        text-transform: inherit;
        padding: 0.25rem 0.9rem;
        cursor: pointer;
      }
      button:active,
      button[aria-pressed="true"] {
        border-color: var(--bevel-dark) var(--bevel-light) var(--bevel-light) var(--bevel-dark);
        color: #fff;
      }
      button:focus-visible, select:focus-visible {
        outline: 1px dashed var(--accent);
        outline-offset: 2px;
      }
      #preset-controls { display: none; }
      body.mode-milkdrop #preset-controls { display: flex; }
      #stage-name { min-width: 9ch; }
      #status {
        color: var(--dim);
        margin-left: auto;
        text-align: right;
        min-height: 1.2em;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        max-width: 40ch;
      }
      #capture {
        color: #ff8a5a;
        flex: none;
        display: none;
      }
      #capture.visible { display: inline; }
      #settings-panel {
        position: absolute;
        left: 0.7rem;
        bottom: 0.7rem;
        width: min(30rem, 90vw);
        background: var(--panel);
        border: 2px solid;
        border-color: var(--bevel-light) var(--bevel-dark) var(--bevel-dark) var(--bevel-light);
        padding: 0.8rem;
        display: none;
        z-index: 5;
      }
      #settings-panel.open { display: block; }
      #settings-panel h3 { margin: 0 0 0.6rem; font-size: 1rem; font-weight: normal; color: var(--dim); }
      #settings-panel dl { margin: 0 0 0.8rem; display: grid; grid-template-columns: auto 1fr; gap: 0.3rem 1rem; }
      #settings-panel dt { color: var(--dim); }
      #settings-panel dd { margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      #playlist-panel {
        position: absolute;
        right: 0.7rem;
        bottom: 0.7rem;
        width: min(28rem, 90vw);
        max-height: 60%;
        overflow-y: auto;
        background: var(--panel);
        border: 2px solid;
        border-color: var(--bevel-light) var(--bevel-dark) var(--bevel-dark) var(--bevel-light);
        padding: 0.6rem;
        display: none;
        z-index: 5;
      }
      #playlist-panel.open { display: block; }
      #playlist-panel h3 {
        margin: 0 0 0.5rem;
        font-size: 1rem;
        font-weight: normal;
        color: var(--dim);
        display: flex;
        justify-content: space-between;
        gap: 0.5rem;
      }
      #playlist-panel h3 button { padding: 0.1rem 0.6rem; }
      #playlist-items { list-style: none; margin: 0; padding: 0; }
      #playlist-items li {
        padding: 0.35rem 0.4rem;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #playlist-items li:hover { background: #22223a; color: #fff; }
      #playlist-items li.note { color: var(--dim); cursor: default; white-space: normal; }
      /* narrow windows: stack the deck */
      @media (max-width: 640px) {
        #deck { grid-template-columns: 1fr; }
        #vis { grid-row: auto; }
      }
    </style>
  </head>
  <body id="stage-root">
    <div id="titlebar">Reamp</div>
    <div id="stage">
      <canvas id="milkdrop-bg"></canvas>
      <canvas id="scene-bg"></canvas>
      <div id="webamp-container"></div>
      <aside id="settings-panel" aria-label="Settings">
        <h3>Settings</h3>
        <dl>
          <dt>Capture</dt><dd id="set-capture">…</dd>
          <dt>Audio source</dt><dd id="set-sidecar">…</dd>
          <dt>Version</dt><dd id="set-version">…</dd>
        </dl>
        <button id="send-feedback">Send Feedback</button>
      </aside>
      <aside id="playlist-panel" aria-label="Playlists">
        <h3><span id="playlist-title">Playlists</span><button id="playlist-back" hidden>‹ Back</button></h3>
        <ul id="playlist-items"></ul>
      </aside>
    </div>
    <section id="deck">
      <canvas id="vis" title="Click to cycle vis modes" tabindex="0"></canvas>
      <div id="readout">
        <span id="marquee">Play something in Spotify or Music</span>
        <span id="capture"></span>
        <span id="time">0:00 / 0:00</span>
      </div>
      <div id="controls">
        <span class="btn-group">
          <button id="prev" title="Previous">⏮</button>
          <button id="playpause" title="Play/Pause">▶</button>
          <button id="next" title="Next">⏭</button>
        </span>
        <span class="btn-group" role="group" aria-label="Stage visuals">
          <button id="stage-prev" title="Previous visual">‹</button>
          <button id="stage-name" title="Cycle stage visual">Off</button>
          <button id="stage-next" title="Next visual">›</button>
          <button id="fullscreen" title="Fullscreen visuals">⛶</button>
        </span>
        <span class="btn-group" id="preset-controls">
          <button id="preset-prev" title="Previous preset">‹</button>
          <button id="preset-random" title="Random preset">?</button>
          <button id="preset-next" title="Next preset">›</button>
        </span>
        <button id="playlists" title="Browse playlists">Playlists</button>
        <button id="settings-btn" title="Settings">⚙</button>
        <select id="source" title="Source">
          <option value="spotify">Spotify</option>
          <option value="apple-music">Apple Music</option>
        </select>
        <span id="status">waiting for player state…</span>
      </div>
    </section>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
